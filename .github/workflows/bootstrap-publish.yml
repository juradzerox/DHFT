name: Bootstrap Publish DHFT

on:
  push:
    paths:
      - ".github/workflows/bootstrap-publish.yml"

permissions:
  contents: write

env:
  RELEASE_TAG: v0.1.0
  SOURCE_SHA256: 7cbb7631c8211fec8d0d6f9ab8f216aa5cbcc694b075f4c2c40a287074145593

jobs:
  publish:
    name: Publish source and release packages
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Unpack prepared source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/dhft-source
          cat .bootstrap/source.b64.part* > /tmp/dhft-source.tar.gz.b64
          base64 -d -i /tmp/dhft-source.tar.gz.b64 -o /tmp/dhft-source.tar.gz
          actual_sha="$(shasum -a 256 /tmp/dhft-source.tar.gz | awk '{print $1}')"
          echo "source sha256: $actual_sha"
          test "$actual_sha" = "$SOURCE_SHA256"
          tar -xzf /tmp/dhft-source.tar.gz -C /tmp/dhft-source
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R /tmp/dhft-source/. .
          rm -f .github/workflows/release.yml
          git checkout -- .github/workflows/bootstrap-publish.yml

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Test
        run: |
          go test ./...
          go vet ./...

      - name: Build packages
        run: ./scripts/build-packages.sh

      - name: Commit published source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish DHFT source"
          git push

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: DHFT ${{ env.RELEASE_TAG }}
          make_latest: true
          body: |
            First public release of Data Hoarder File Transfer (DHFT).

            Download the matching server package for the uploader machine and
            the matching client package for the downloader machine.
          files: |
            packages/DHFT-Server-Windows.zip
            packages/DHFT-Client-Windows.zip
            packages/DHFT-Server-macOS.zip
            packages/DHFT-Client-macOS.zip
