name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build release packages
    runs-on: macos-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Test
        run: |
          go test ./...
          go vet ./...

      - name: Build packages
        run: ./scripts/build-packages.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: DHFT ${{ github.ref_name }}
          body: |
            Data Hoarder File Transfer (DHFT) release ${{ github.ref_name }}.

            Download the matching server package for the uploader machine and
            the matching client package for the downloader machine.
          files: |
            packages/DHFT-Server-Windows.zip
            packages/DHFT-Client-Windows.zip
            packages/DHFT-Server-macOS.zip
            packages/DHFT-Client-macOS.zip
